name: "e5.stack/api"
services:
  postgresql:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
        - ${DB_PORT}:5432
    volumes:
      - postgresql:/var/lib/postgresql/data

volumes:
  postgresql: